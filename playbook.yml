---
# Main playbook for deploying Talos Kubernetes cluster with Cilium CNI
# Supports both internet-connected and air-gapped deployments
# Usage: ansible-playbook -i inventory/hosts.yml playbook.yml

- name: Validate air-gapped environment
  hosts: localhost
  gather_facts: false
  tags: [validate_airgap]
  vars_files:
    - vars/airgap.yml
  roles:
    - role: validate_airgap
      when: airgap_enabled | default(false)

- name: Install prerequisites
  hosts: localhost
  gather_facts: true
  tags: [prerequisites]
  roles:
    - prerequisites

- name: Generate Talos configurations
  hosts: localhost
  gather_facts: false
  tags: [generate]
  roles:
    - generate_configs

- name: Apply configurations to nodes
  hosts: localhost
  gather_facts: false
  tags: [apply]
  roles:
    - apply_configs

- name: Bootstrap Kubernetes cluster
  hosts: localhost
  gather_facts: false
  tags: [bootstrap]
  roles:
    - bootstrap_cluster

- name: Install Cilium CNI
  hosts: localhost
  gather_facts: false
  tags: [cilium]
  vars_files:
    - vars/cilium_images.yml
  roles:
    - install_cilium

- name: Validate cluster deployment
  hosts: localhost
  gather_facts: false
  tags: [validate]
  roles:
    - validate_cluster
