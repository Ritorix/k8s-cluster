---
# =============================================================================
# AIR-GAP REGISTRY CONFIGURATION
# =============================================================================
# Configure your local container registry here
# All image definitions are in vars/cilium_images.yml

# =============================================================================
# AIR-GAP MODE
# =============================================================================
# Set to false for internet-connected deployments (images pulled from public registries)
# Set to true for air-gapped deployments (images pulled from local registry)
airgap_enabled: false

# =============================================================================
# REGISTRY SETTINGS
# =============================================================================
# Only required if airgap_enabled: true

# Local container registry URL
# Format: hostname:port or hostname (if using standard ports)
# Examples:
#   - registry.local:5000
#   - registry.company.com:5000
#   - myregistry.example.com
local_registry_url: "registry.local:5000"

# Registry authentication (leave empty if no auth required)
# SECURITY: Use ansible-vault to encrypt this file if storing credentials
registry_username: ""
registry_password: ""

# TLS configuration
# Set to true if registry uses self-signed certificates
registry_insecure_skip_verify: false

# Optional: Path to CA certificate for registry with self-signed certs
# Uncomment and set path if needed:
# registry_ca_cert: "{{ playbook_dir }}/files/registry-ca.crt"

# =============================================================================
# REGISTRY MIRRORS FOR TALOS
# =============================================================================
# These are automatically configured in Talos machine configs
# No need to edit unless using different registries

registry_mirrors:
  docker.io:
    endpoints:
      - "{{ local_registry_url }}/docker.io"
  
  registry.k8s.io:
    endpoints:
      - "{{ local_registry_url }}/registry.k8s.io"
  
  quay.io:
    endpoints:
      - "{{ local_registry_url }}/quay.io"
  
  ghcr.io:
    endpoints:
      - "{{ local_registry_url }}/ghcr.io"

# =============================================================================
# NOTES
# =============================================================================
# 1. ALL IMAGE DEFINITIONS are in vars/cilium_images.yml
# 2. Edit cilium_images.yml to change any image repository or tag
# 3. After editing images, run: ./scripts/mirror-all-images.sh
# 4. This file only configures the registry connection and mirrors
