---
# Inventory file for Talos Kubernetes cluster
#
# WORKFLOW for Static IP Configuration:
# 1. Set ansible_host to DHCP IP (for initial connection)
# 2. Set static_ip, static_gateway for permanent IP
# 3. Apply config via DHCP, node switches to static IP
# 4. Update ansible_host to match static_ip for future operations

all:
  children:
    talos_cluster:
      children:
        control_plane:
          hosts:
            kg01:
              ansible_host: 10.100.1.11  # Current DHCP IP (for connection)
              static_ip: 10.100.1.201      # Desired static IP
              static_gateway: 10.100.1.1
              static_netmask: "24"         # CIDR notation (24 = 255.255.255.0)
              static_interface: "eth0"     # Network interface
              # Optional: Override per-node settings
              # install_disk: /dev/sda
              # talos_node_labels: {}
            kg02:
              ansible_host: 10.100.1.12  # DHCP IP
              static_ip: 10.100.1.202      # Static IP
              static_gateway: 10.100.1.1
              static_netmask: "24"
              static_interface: "eth0"
        
        workers:
          hosts:
            kw01:
              ansible_host: 10.100.1.13  # DHCP IP
              static_ip: 10.100.1.101      # Static IP
              static_gateway: 10.100.1.1
              static_netmask: "24"
              static_interface: "eth0"
            kw02:
              ansible_host: 10.100.1.14  # DHCP IP
              static_ip: 10.100.1.102      # Static IP
              static_gateway: 10.100.1.1
              static_netmask: "24"
              static_interface: "eth0"
            kw03:
              ansible_host: 10.100.1.15  # DHCP IP
              static_ip: 10.100.1.103      # Static IP
              static_gateway: 10.100.1.1
              static_netmask: "24"
              static_interface: "eth0"

  vars:
    # Connection settings for Talos nodes (not using SSH)
    ansible_connection: local

# =============================================================================
# NOTES:
# =============================================================================
# 1. DHCP Discovery: Boot nodes, check DHCP server for assigned IPs
# 2. Set ansible_host: Use discovered DHCP IP for initial connection
# 3. Configure static IPs: Set static_ip, static_gateway, static_netmask
# 4. Deploy: Run playbook - connects via DHCP, configures static IPs
# 5. After Apply: Nodes switch to static IPs automatically
# 6. Optional: Update ansible_host to match static_ip for clarity
#
# If static_ip variables are omitted, nodes will continue using DHCP
# =============================================================================
