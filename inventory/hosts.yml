---
# Inventory file for Talos Kubernetes cluster
# Update the IP addresses for your nodes
# Note: With DHCP, nodes will get IPs automatically. You may need to discover
# them from your DHCP server or node consoles after initial boot.

all:
  children:
    talos_cluster:
      children:
        control_plane:
          hosts:
            cp01:
              ansible_host: 192.168.1.10
              # Optional: Override per-node settings
              # install_disk: /dev/sda
              # talos_node_labels: {}
            cp02:
              ansible_host: 192.168.1.11
            cp03:
              ansible_host: 192.168.1.12
        
        workers:
          hosts:
            worker01:
              ansible_host: 192.168.1.20
            worker02:
              ansible_host: 192.168.1.21
            worker03:
              ansible_host: 192.168.1.22

  vars:
    # Connection settings for Talos nodes (not using SSH)
    ansible_connection: local
