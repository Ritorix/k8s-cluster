---
# Tasks for generating Talos configurations with Cilium

- name: Display configuration generation banner
  ansible.builtin.debug:
    msg: "Generating Talos cluster configurations..."

- name: Check if secrets file already exists
  ansible.builtin.stat:
    path: "{{ talos_secrets_file }}"
  register: secrets_check

- name: Generate Talos secrets bundle
  ansible.builtin.command:
    cmd: talosctl gen secrets -o "{{ talos_secrets_file }}"
  when: not secrets_check.stat.exists
  changed_when: true

- name: Display secrets status
  ansible.builtin.debug:
    msg: "{{ '✓ Generated new secrets' if not secrets_check.stat.exists else '✓ Using existing secrets from ' + talos_secrets_file }}"

- name: Generate registry mirror patch
  ansible.builtin.template:
    src: registry-mirror-patch.yaml.j2
    dest: "{{ talos_config_dir }}/registry-mirror-patch.yaml"
    mode: '0644'
  when: airgap_enabled | default(false)

- name: Generate CNI patch
  ansible.builtin.template:
    src: cni-patch.yaml.j2
    dest: "{{ talos_config_dir }}/cni-patch.yaml"
    mode: '0644'

- name: Generate time/NTP patch
  ansible.builtin.template:
    src: time-patch.yaml.j2
    dest: "{{ talos_config_dir }}/time-patch.yaml"
    mode: '0644'
  when: ntp_servers is defined and ntp_servers | length > 0

- name: Generate static IP patches for each node
  ansible.builtin.template:
    src: static-ip-patch.yaml.j2
    dest: "{{ talos_config_dir }}/{{ item }}-static-ip-patch.yaml"
    mode: '0644'
  loop: "{{ groups['control_plane'] + groups['workers'] }}"
  when: hostvars[item].static_ip is defined
  vars:
    inventory_hostname: "{{ item }}"
    static_ip: "{{ hostvars[item].static_ip }}"
    static_gateway: "{{ hostvars[item].static_gateway }}"
    static_netmask: "{{ hostvars[item].static_netmask | default('24') }}"
    static_interface: "{{ hostvars[item].static_interface | default('eth0') }}"

- name: Combine patches for controlplane (air-gapped)
  ansible.builtin.shell:
    cmd: |
      {
        cat {{ talos_config_dir }}/registry-mirror-patch.yaml
        echo "---"
        cat {{ talos_config_dir }}/cni-patch.yaml
        {% if ntp_servers is defined and ntp_servers | length > 0 %}
        echo "---"
        cat {{ talos_config_dir }}/time-patch.yaml
        {% endif %}
      } > {{ talos_config_dir }}/controlplane-combined-patch.yaml
  changed_when: true
  when: airgap_enabled | default(false)

- name: Combine patches for workers (air-gapped)
  ansible.builtin.shell:
    cmd: |
      {
        cat {{ talos_config_dir }}/registry-mirror-patch.yaml
        echo "---"
        cat {{ talos_config_dir }}/cni-patch.yaml
        {% if ntp_servers is defined and ntp_servers | length > 0 %}
        echo "---"
        cat {{ talos_config_dir }}/time-patch.yaml
        {% endif %}
      } > {{ talos_config_dir }}/worker-combined-patch.yaml
  changed_when: true
  when: airgap_enabled | default(false)

- name: Use only CNI patch for controlplane (internet-connected)
  ansible.builtin.shell:
    cmd: |
      {
        cat {{ talos_config_dir }}/cni-patch.yaml
        {% if ntp_servers is defined and ntp_servers | length > 0 %}
        echo "---"
        cat {{ talos_config_dir }}/time-patch.yaml
        {% endif %}
      } > {{ talos_config_dir }}/controlplane-combined-patch.yaml
  changed_when: true
  when: not (airgap_enabled | default(false))

- name: Use only CNI patch for workers (internet-connected)
  ansible.builtin.shell:
    cmd: |
      {
        cat {{ talos_config_dir }}/cni-patch.yaml
        {% if ntp_servers is defined and ntp_servers | length > 0 %}
        echo "---"
        cat {{ talos_config_dir }}/time-patch.yaml
        {% endif %}
      } > {{ talos_config_dir }}/worker-combined-patch.yaml
  changed_when: true
  when: not (airgap_enabled | default(false))

- name: Generate Talos machine configurations
  ansible.builtin.command:
    cmd: >
      talosctl gen config {{ cluster_name }} https://{{ cluster_endpoint }}:{{ cluster_endpoint_port }}
      --with-secrets {{ talos_secrets_file }}
      --config-patch-control-plane @{{ talos_config_dir }}/controlplane-combined-patch.yaml
      --config-patch-worker @{{ talos_config_dir }}/worker-combined-patch.yaml
      --output {{ talos_config_dir }}
      --force
  changed_when: true

- name: Display generated files
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Configuration Files Generated"
      - "=========================================="
      - "✓ Secrets: {{ talos_secrets_file }}"
      - "✓ Control Plane Config: {{ talos_config_dir }}/controlplane.yaml"
      - "✓ Worker Config: {{ talos_config_dir }}/worker.yaml"
      - "✓ Talosconfig: {{ talos_config_dir }}/talosconfig"
      - ""
      - "Configuration includes:"
      - "{% if airgap_enabled | default(false) %}  • Registry mirrors (air-gapped mode){% endif %}"
      - "  • CNI disabled (Cilium installed post-bootstrap)"
      - "{% if ntp_servers is defined and ntp_servers | length > 0 %}  • NTP servers configured: {{ ntp_servers | join(', ') }}{% endif %}"
      - "{% if groups['control_plane'] | map('extract', hostvars) | selectattr('static_ip', 'defined') | list | length > 0 %}  • Static IP configuration for nodes{% endif %}"
      - "=========================================="
